  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

==================================== */\n\n:root {\n  /* surfaces */\n  --bg-dark:    #0a0c0a;\n  --bg-dark-2:  #0f120e;\n  --bg-card-d:  #14180f;\n  --bg-light:   #f2f3ec;\n  --bg-light-2: #eaecdf;\n  --bg-card-l:  #ffffff;\n\n  /* ink */\n  --paper:      #f5f7f1;\n  --paper-soft: #9aa392;\n  --paper-faint:#6c7464;\n  --ink:        #0c0e0a;\n  --ink-soft:   #565d4d;\n  --ink-faint:  #828a76;\n\n  /* accent */\n  --lime:       #84cc16;\n  --lime-bright:#a3e635;\n  --lime-deep:  #4d7c0f;\n  --lime-dim:   #65a30d;\n\n  /* lines */\n  --line-d:     rgba(255,255,255,.09);\n  --line-d-2:   rgba(255,255,255,.14);\n  --line-lime:  rgba(132,204,22,.30);\n  --line-l:     rgba(12,14,10,.10);\n\n  --r-sm: 10px;\n  --r-md: 16px;\n  --r-lg: 24px;\n  --r-xl: 32px;\n  --r-pill: 999px;\n\n  --shadow-l: 0 1px 2px rgba(20,30,10,.04), 0 12px 32px -12px rgba(20,30,10,.14);\n  --shadow-lime: 0 0 0 1px rgba(132,204,22,.4), 0 16px 50px -10px rgba(132,204,22,.45);\n\n  --maxw: 1200px;\n  --pad: clamp(20px, 5vw, 80px);\n\n  --font-display: \"Be Vietnam Pro\", system-ui, sans-serif;\n  --font-body:    \"Be Vietnam Pro\", system-ui, sans-serif;\n  --font-mono:    \"JetBrains Mono\", ui-monospace, monospace;\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }\n@media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }\n\nbody {\n  font-family: var(--font-body);\n  background: var(--bg-dark);\n  color: var(--paper);\n  line-height: 1.6;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  overflow-x: hidden;\n}\n\nimg, svg { display: block; max-width: 100%; }\na { color: inherit; text-decoration: none; }\nbutton { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }\n\n::selection { background: var(--lime); color: #0a0c0a; }\n\n/* ---------- layout ---------- */\n.wrap { width: 100%; max-width: var(--maxw); margin-inline: auto; padding-inline: var(--pad); }\n.section { padding-block: clamp(72px, 11vw, 150px); position: relative; }\n\n.eyebrow {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  font-weight: 600;\n  letter-spacing: .26em;\n  text-transform: uppercase;\n  color: var(--lime);\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n}\n.eyebrow::before {\n  content: \"\";\n  width: 22px; height: 1px;\n  background: var(--lime);\n  opacity: .7;\n}\n.eyebrow.center::before { display: none; }\n\nh1, h2, h3 { font-family: var(--font-display); font-weight: 800; line-height: 1.04; letter-spacing: -0.02em; }\n.h-display { font-size: clamp(40px, 7.2vw, 92px); font-weight: 900; letter-spacing: -0.035em; line-height: 0.98; }\n.h-section { font-size: clamp(30px, 4.6vw, 56px); }\n.lead { font-size: clamp(16px, 1.5vw, 19px); color: var(--paper-soft); max-width: 56ch; }\n.section.light .lead { color: var(--ink-soft); }\n\n/* ---------- theme blocks ---------- */\n.section.dark  { background: var(--bg-dark); color: var(--paper); }\n.section.light { background: var(--bg-light); color: var(--ink); }\n.section.light h1, .section.light h2, .section.light h3 { color: var(--ink); }\n\n.glow {\n  position: absolute;\n  border-radius: 50%;\n  background: radial-gradient(circle, rgba(132,204,22,.30), rgba(132,204,22,.06) 38%, transparent 66%);\n  filter: blur(20px);\n  pointer-events: none;\n  z-index: 0;\n}\n\n/* ---------- buttons ---------- */\n.btn {\n  display: inline-flex; align-items: center; gap: 9px;\n  padding: 13px 22px;\n  border-radius: var(--r-pill);\n  font-weight: 600; font-size: 15px;\n  transition: transform .18s ease, background .18s ease, box-shadow .25s ease, color .18s;\n  white-space: nowrap;\n}\n.btn:active { transform: translateY(1px); }\n.btn-lime {\n  background: var(--lime); color: #0a0c0a;\n  box-shadow: 0 8px 24px -8px rgba(132,204,22,.6);\n}\n.btn-lime:hover { background: var(--lime-bright); box-shadow: 0 12px 34px -8px rgba(132,204,22,.75); transform: translateY(-2px); }\n.btn-ghost-d { color: var(--paper); border: 1px solid var(--line-d-2); }\n.btn-ghost-d:hover { border-color: var(--lime); color: var(--lime); }\n.btn-ghost-l { color: var(--ink); border: 1px solid var(--line-l); background: var(--bg-card-l); }\n.btn-ghost-l:hover { border-color: var(--lime-dim); color: var(--lime-deep); }\n.btn .arr { transition: transform .2s ease; }\n.btn:hover .arr { transform: translateX(3px); }\n\n/* ---------- pill / badge ---------- */\n.pill {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-family: var(--font-mono);\n  font-size: 12px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;\n  padding: 7px 15px; border-radius: var(--r-pill);\n}\n.pill-lime {\n  background: linear-gradient(180deg, var(--lime-bright), var(--lime));\n  color: #15300a;\n  box-shadow: 0 0 22px rgba(132,204,22,.55), inset 0 1px 0 rgba(255,255,255,.4);\n}\n.pill-outline-d { border: 1px solid var(--line-d-2); color: var(--paper-soft); }\n.pill-dot::before { content:\"\"; width:7px; height:7px; border-radius:50%; background: currentColor; }\n\n/* ============================================================\n   HEADER\n   ============================================================ */\n.site-header {\n  position: fixed; inset: 0 0 auto 0; z-index: 100;\n  transition: background .3s ease, border-color .3s ease, backdrop-filter .3s;\n  border-bottom: 1px solid transparent;\n}\n.site-header.scrolled {\n  background: rgba(10,12,10,.72);\n  backdrop-filter: blur(16px) saturate(140%);\n  border-bottom-color: var(--line-d);\n}\n.nav { display: flex; align-items: center; justify-content: space-between; height: 74px; }\n.brand { display: flex; align-items: baseline; gap: 10px; }\n.brand-mark { font-family: var(--font-display); font-weight: 900; font-size: 23px; letter-spacing: -0.04em; }\n.brand-mark b { color: var(--lime); }\n.brand-tag {\n  font-family: var(--font-mono); font-size: 9px; letter-spacing: .22em;\n  text-transform: uppercase; color: var(--paper-faint);\n}\n@media (max-width: 700px){ .brand-tag { display: none; } }\n\n.nav-links { display: flex; align-items: center; gap: 6px; }\n.nav-links a {\n  font-size: 14.5px; font-weight: 500; color: var(--paper-soft);\n  padding: 9px 14px; border-radius: var(--r-pill); transition: color .18s, background .18s;\n}\n.nav-links a:hover { color: var(--paper); background: rgba(255,255,255,.05); }\n.nav-cta { display: flex; align-items: center; gap: 12px; }\n.nav-toggle { display: none; width: 42px; height: 42px; border-radius: 12px; border: 1px solid var(--line-d-2); align-items: center; justify-content: center; }\n.nav-toggle span { width: 18px; height: 1.6px; background: var(--paper); position: relative; transition: .25s; }\n.nav-toggle span::before, .nav-toggle span::after { content:\"\"; position:absolute; left:0; width:18px; height:1.6px; background: var(--paper); transition:.25s; }\n.nav-toggle span::before { top: -6px; } .nav-toggle span::after { top: 6px; }\n.nav-open .nav-toggle span { background: transparent; }\n.nav-open .nav-toggle span::before { top:0; transform: rotate(45deg); }\n.nav-open .nav-toggle span::after  { top:0; transform: rotate(-45deg); }\n\n@media (max-width: 880px){\n  .nav-links {\n    position: fixed; inset: 74px 0 auto 0;\n    flex-direction: column; align-items: stretch; gap: 2px;\n    background: rgba(10,12,10,.96); backdrop-filter: blur(20px);\n    padding: 16px var(--pad) 26px; border-bottom: 1px solid var(--line-d);\n    transform: translateY(-12px); opacity: 0; pointer-events: none; transition: .25s;\n  }\n  .nav-open .nav-links { transform: none; opacity: 1; pointer-events: auto; }\n  .nav-links a { padding: 14px 8px; font-size: 17px; border-radius: 10px; }\n  .nav-cta .btn-text { display: none; }\n  .nav-toggle { display: inline-flex; }\n  .nav .nav-cta > .btn-lime { display: none; }\n  .nav-links .btn-lime { display: inline-flex; justify-content: center; margin-top: 10px; }\n}\n.nav-links .mobile-only { display: none; }\n@media (max-width: 880px){ .nav-links .mobile-only { display: inline-flex; } }\n\n/* ============================================================\n   HERO\n   ============================================================ */\n.hero { position: relative; padding-top: 150px; padding-bottom: 90px; overflow: hidden; }\n.hero .glow-a { width: 820px; height: 600px; top: -240px; left: 50%; transform: translateX(-50%); opacity: .75; }\n.hero .grid-bg {\n  position: absolute; inset: 0; z-index: 0; opacity: .35;\n  background-image: linear-gradient(var(--line-d) 1px, transparent 1px), linear-gradient(90deg, var(--line-d) 1px, transparent 1px);\n  background-size: 64px 64px;\n  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 75%);\n          mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 75%);\n}\n.hero-inner { position: relative; z-index: 2; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 26px; }\n.hero h1 { max-width: 16ch; }\n.hero h1 .grad { background: linear-gradient(120deg, var(--lime-bright), var(--lime) 55%, var(--lime-deep)); -webkit-background-clip: text; background-clip: text; color: transparent; }\n.hero .lead { text-align: center; margin-inline: auto; }\n.hero-actions { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }\n\n.hero-solutions { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; max-width: 760px; margin-top: 30px; }\n@media (max-width: 620px){ .hero-solutions { grid-template-columns: 1fr; } }\n.sol-card {\n  position: relative; text-align: left; padding: 22px 24px;\n  border-radius: var(--r-md); border: 1px solid var(--line-d);\n  background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.01));\n  transition: border-color .22s, transform .22s, background .22s;\n  display: flex; flex-direction: column; gap: 6px; overflow: hidden;\n}\n.sol-card:hover { border-color: var(--line-lime); transform: translateY(-3px); }\n.sol-card .sol-name { font-family: var(--font-display); font-weight: 800; font-size: 19px; display: flex; align-items: center; gap: 9px; }\n.sol-card .sol-name i { width: 8px; height: 8px; border-radius: 50%; background: var(--lime); box-shadow: 0 0 10px var(--lime); }\n.sol-card p { color: var(--paper-soft); font-size: 14px; }\n.sol-card .sol-go { margin-top: 6px; color: var(--lime); font-weight: 600; font-size: 14px; display: inline-flex; gap: 7px; align-items: center; }\n.sol-card .sol-go .arr { transition: transform .2s; }\n.sol-card:hover .sol-go .arr { transform: translateX(4px); }\n.sol-card.alt .sol-name i { background: var(--paper-soft); box-shadow: none; }\n.sol-card.alt .sol-go { color: var(--paper-soft); }\n\n/* ---------- marquee strip ---------- */\n.strip { border-block: 1px solid var(--line-d); background: var(--bg-dark-2); overflow: hidden; }\n.strip-track { display: flex; gap: 56px; align-items: center; padding-block: 18px; width: max-content; animation: marq 28s linear infinite; }\n.strip:hover .strip-track { animation-play-state: paused; }\n.strip-item { font-family: var(--font-mono); font-size: 13px; letter-spacing: .12em; text-transform: uppercase; color: var(--paper-faint); display: inline-flex; gap: 12px; align-items: center; white-space: nowrap; }\n.strip-item::after { content: \"✦\"; color: var(--lime); }\n@keyframes marq { to { transform: translateX(-50%); } }\n@media (prefers-reduced-motion: reduce){ .strip-track { animation: none; } }\n\n/* ============================================================\n   SOLUTIONS (tabs)\n   ============================================================ */\n.sol-head { display: flex; flex-direction: column; gap: 18px; align-items: flex-start; margin-bottom: 40px; }\n.tab-row { display: inline-flex; gap: 6px; padding: 5px; border-radius: var(--r-pill); border: 1px solid var(--line-d); background: rgba(255,255,255,.03); flex-wrap: wrap; }\n.tab {\n  padding: 11px 22px; border-radius: var(--r-pill); font-weight: 600; font-size: 14.5px;\n  color: var(--paper-soft); transition: .2s; display: inline-flex; align-items: center; gap: 9px;\n}\n.tab i { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .55; }\n.tab[aria-selected=\"true\"] { background: var(--lime); color: #0a0c0a; }\n.tab[aria-selected=\"true\"] i { opacity: 1; background: #0a0c0a; }\n.tab:not([aria-selected=\"true\"]):hover { color: var(--paper); }\n\n.sol-panel { display: none; }\n.sol-panel.active { display: block; animation: slidein .4s ease; }\n@keyframes slidein { from { transform: translateY(10px); } to { transform: none; } }\n\n.sol-grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 28px; align-items: stretch; }\n@media (max-width: 900px){ .sol-grid { grid-template-columns: 1fr; } }\n\n.panel-lead h3 { font-size: clamp(26px, 3.4vw, 40px); margin-bottom: 14px; }\n.panel-lead p { color: var(--paper-soft); font-size: 16px; max-width: 44ch; margin-bottom: 26px; }\n.benefit-list { display: flex; flex-direction: column; gap: 16px; }\n.benefit {\n  display: grid; grid-template-columns: auto 1fr; gap: 14px; align-items: start;\n  padding: 16px 18px; border-radius: var(--r-md); border: 1px solid var(--line-d);\n  background: linear-gradient(180deg, rgba(132,204,22,.05), transparent);\n  transition: border-color .2s, transform .2s;\n}\n.benefit:hover { border-color: var(--line-lime); transform: translateX(4px); }\n.benefit .ck { width: 26px; height: 26px; border-radius: 8px; background: rgba(132,204,22,.16); color: var(--lime); display: grid; place-items: center; font-size: 14px; }\n.benefit b { font-weight: 700; font-size: 15.5px; display: block; }\n.benefit span { color: var(--paper-soft); font-size: 13.5px; }\n\n/* pain card (right) */\n.pain-card { padding: 26px; border-radius: var(--r-lg); border: 1px solid var(--line-d); background: var(--bg-card-d); display: flex; flex-direction: column; gap: 14px; }\n.pain-card .pain-title { fo

# asyncs.tech landing — server block for HaloERP's nginx edge.
#
# This is NOT served by a separate proxy. HaloERP's `halo-prod-edge-1` nginx
# already owns :80/:443 on this VPS; we simply add asyncs.tech to it and let it
# forward to the landing container (async_web_prod) over the shared Docker
# network `halo-prod_default`.
#
# Install on the VPS:
#   cp deploy/asyncs-edge.conf /home/halo/apps/halo-prod/deploy/edge/conf.d/asyncs.conf
#   docker exec halo-prod-edge-1 nginx -t && docker exec halo-prod-edge-1 nginx -s reload
#
# Prerequisite: a Let's Encrypt cert for asyncs.tech must already exist at
# /etc/letsencrypt/live/asyncs.tech/ (see the runbook), otherwise nginx -t fails.

# ── HTTP :80 — ACME challenge + redirect to HTTPS ──
server {
  listen 80;
  listen [::]:80;
  server_name asyncs.tech www.asyncs.tech;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS :443 — landing app (async_web_prod:3000) ──
server {
  listen 443 ssl;
  http2 on;
  server_name asyncs.tech www.asyncs.tech;

  ssl_certificate     /etc/letsencrypt/live/asyncs.tech/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/asyncs.tech/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  location / {
    proxy_pass http://async_web_prod:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

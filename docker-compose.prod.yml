# ─────────────────────────────────────────────────────────────
# ASyncs Landing — full production stack (app + Postgres) on a VPS.
#
#   1. Copy .env.prod.example -> .env.prod and set a strong POSTGRES_PASSWORD.
#   2. docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# The "migrate" service applies Drizzle migrations once, then exits; "web"
# only starts after migrations finish successfully.
# ─────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:17-alpine
    container_name: async_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-async}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-async}
    volumes:
      - async_pgdata_prod:/var/lib/postgresql/data
    # Not published to the host: only reachable on the internal Docker network.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-async} -d ${POSTGRES_DB:-async}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrator
    environment:
      # Use the container name (not the "postgres" service alias): once "web"
      # joins halo-prod_default, a bare "postgres" would clash with HaloERP's
      # own postgres alias on that network.
      DATABASE_URL: postgres://${POSTGRES_USER:-async}:${POSTGRES_PASSWORD}@async_postgres_prod:5432/${POSTGRES_DB:-async}
      # Consumed only by the one-off `npm run create-admin` (empty otherwise).
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      target: runner
    container_name: async_web_prod
    restart: unless-stopped
    environment:
      # Use the container name (not the "postgres" service alias): once "web"
      # joins halo-prod_default, a bare "postgres" would clash with HaloERP's
      # own postgres alias on that network.
      DATABASE_URL: postgres://${POSTGRES_USER:-async}:${POSTGRES_PASSWORD}@async_postgres_prod:5432/${POSTGRES_DB:-async}
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
    # No host port. The existing HaloERP nginx edge already owns 80/443 (and
    # 127.0.0.1:3000), so we don't publish anything. Instead "web" joins the
    # HaloERP edge network and that nginx proxies asyncs.tech -> async_web_prod:3000.
    networks:
      - default
      - halo_edge
    volumes:
      # Uploaded project thumbnails — persisted outside the container.
      - async_uploads_prod:/app/uploads

networks:
  # web <-> postgres <-> migrate live on the project's own default network.
  default:
  # HaloERP's compose network — its nginx edge lives here and reaches us by
  # container name. Must already exist (it does: `halo-prod_default`).
  halo_edge:
    external: true
    name: halo-prod_default

volumes:
  async_pgdata_prod:
  async_uploads_prod:

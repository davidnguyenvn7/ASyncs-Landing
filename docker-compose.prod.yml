# ─────────────────────────────────────────────────────────────
# ASyncs Landing — full production stack (app + Postgres) on a VPS.
#
#   1. Copy .env.prod.example -> .env.prod and set a strong POSTGRES_PASSWORD.
#   2. docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# The "migrate" service applies Drizzle migrations once, then exits; "web"
# only starts after migrations finish successfully.
# ─────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:17-alpine
    container_name: async_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-async}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-async}
    volumes:
      - async_pgdata_prod:/var/lib/postgresql/data
    # Not published to the host: only reachable on the internal Docker network.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-async} -d ${POSTGRES_DB:-async}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-async}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-async}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      target: runner
    container_name: async_web_prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-async}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-async}
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      # Bind to localhost only; put Nginx/Caddy in front for TLS + domain.
      - "127.0.0.1:3000:3000"

volumes:
  async_pgdata_prod:
